{% extends 'membres/base.html' %}
{% block titre %}Connexion — AssocManager{% endblock %}

{% block contenu %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card mt-5">
            <div class="card-body p-4">
                <h4 class="card-title mb-4 text-center">
                    <i class="bi bi-person-lock me-2"></i>Connexion
                </h4>
                <form method="post">
                    {% csrf_token %}
                    {% if form.errors %}
                    <div class="alert alert-danger">Identifiant ou mot de passe incorrect.</div>
                    {% endif %}
                    <div class="mb-3">
                        <label for="id_username" class="form-label">Identifiant</label>
                        <input type="text" name="username" id="id_username" class="form-control" autofocus required>
                    </div>
                    <div class="mb-3">
                        <label for="id_password" class="form-label">Mot de passe</label>
                        <input type="password" name="password" id="id_password" class="form-control" required>
                    </div>
                    <input type="hidden" name="next" value="{{ next }}">
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-box-arrow-in-right me-1"></i>Se connecter
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
